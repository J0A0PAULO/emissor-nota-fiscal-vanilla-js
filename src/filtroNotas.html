<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/filtroNotas.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <title>Filtro de notas</title>
</head>

<body>

  <div class="container-header">
    <h1>CADASTRO DE SERVICOS PRESTADOS</h1>
  </div>

  <div class="container-filtro">
    <div class="filtro-notas">
      <h1>FILTRAR NOTAS</h1>
      <input type="text" placeholder="Pesquisar" class="input-filtro">
      <button class="pesquisar"><img src="./assets/icons/pesquisarNota.png" alt="pesquisar"></button>
    </div>
  </div>

  <div class="container-exibir">
    <div class="container-atributos">
      <h5>CODIGO</h5>
      <h5>DESCRICAO SERVICO</h5>
      <h5>DATA </h5>
      <h5>CPF/CNPJ</h5>
      <h5>NOME</h5>
      <h5>QUANTIDADE</h5>
      <h5>PRECO</h5>
      <h5>VALOR</h5>
    </div>
    <div class="exibirNota">
      <div class="nota">
        <h5>CODIGO</h5>
        <h5>DESCRICAO SERVICO</h5>
        <h5>DATA </h5>
        <h5>CPF/CNPJ</h5>
        <h5>NOME</h5>
        <h5>QUANTIDADE</h5>
        <h5>PRECO</h5>
        <h5>VALOR</h5>
      </div>
    </div>
  </div>

</body>

</html>
