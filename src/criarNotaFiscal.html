<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/criarNotaFiscal.css">
  <title>Document</title>
</head>

<body>

  <div class="container-header">
    <h1>CADASTRO DE SERVICOS PRESTADOS</h1>
  </div>

  <div class="container-criar-Nota">
    <div class="container-formulario">
      <div class="criar-nota">
        <div class="criar-nota-h1">
          <h1>CRIAR NOTA</h1>
        </div>
        <input type="text" class="descricao" placeholder="DESCRICAO DO PRODUTO">
        <input type="text" class="data" placeholder="DATA">
        <input type="text" class="cpf" placeholder="CPF/CNPJ">
        <input type="text" class="nome" placeholder="NOME">
        <input type="text" class="quantidade" placeholder="QUANTIDADE">
        <input type="text" class="preco" placeholder="PRECO">
        <button class="criarNota">CRIAR</button>
      </div>
    </div>
  </div>
</body>

</html>
