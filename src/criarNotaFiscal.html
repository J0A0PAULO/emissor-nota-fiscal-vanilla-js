<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/criarNotaFiscal.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <title>Criar nota fiscal</title>
</head>

<body>

  <div class="container-header">
    <h1>CADASTRO DE SERVICOS PRESTADOS</h1>
  </div>

  <div class="container-criar-Nota">
    <div class="container-formulario">
      <div class="criar-nota">
        <div class="criar-nota-h1">
          <h1>CRIAR NOTA</h1>
        </div>
        <input type="text" class="descricao" placeholder="DESCRICAO DO PRODUTO">
        <input type="text" class="data" placeholder="DATA" maxlength="8">
        <input type="text" class="cpf" placeholder="CPF/CNPJ" maxlength="11">
        <input type="text" class="nome" placeholder="NOME">
        <input type="text" class="quantidade" placeholder="QUANTIDADE">
        <input type="text" class="preco" placeholder="PRECO">
        <button class="criarNota">CRIAR</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/cpf-cnpj-validator/build/cpf-cnpj-validator.min.js"></script>
  <script src="./js/criarNotaFiscal.js"></script>
  <script src="./js/localStorage.js"></script>
</body>

</html>
