<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/paginaInicial.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <title>Emissor nota fiscal</title>
</head>

<body>
  <div class="cadastroServicos">
    <h1>CADASTRO DE SERVICOS PRESTADOS</h1>
  </div>
  <div class="container">
    <div class="container-menu">
      <div class="criarNota">
        <button class="btn-criarNota"><i><img src="./assets/icons/criarNota.png" alt="Criar Nota"></i></button>
        <p>CRIAR NOTA</p>
      </div>
      <div class="pesquisarNota">
        <button><i><img src="./assets/icons/pesquisarNota.png" alt="Criar Nota"></i></button>
        <p>PESQUISAR</p>
      </div>
    </div>
  </div>

  <div class="container-nota">
    <div class="container-atributos">
      <h5>CODIGO</h5>
      <h5>DESCRICAO SERVICO</h5>
      <h5>DATA</h5>
      <h5>CPF/CNPJ</h5>
      <h5>NOME</h5>
      <h5>QUANTIDADE</h5>
      <h5>PRECO</h5>
      <h5>TOTAL</h5>
    </div>
    <div class="exibirNota">
      <!--nota-fiscal termina aqui-->
    </div>
  </div>

  <script src="./js/paginaInicial.js"></script>
  <script src="./js/localStorage.js"></script>
  
</body>

</html>
